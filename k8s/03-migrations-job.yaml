# ── Job de migraciones ─────────────────────────────────────────────────────────
# Este Job aplica las migraciones de Prisma antes de desplegar una nueva versión
# del backend. Debe ejecutarse ANTES de actualizar el Deployment del backend.
#
# Flujo de despliegue recomendado:
#   1. kubectl apply -f k8s/03-migrations-job.yaml
#   2. kubectl wait --for=condition=complete job/scrumforge-migrations -n scrumforge --timeout=120s
#   3. kubectl apply -f k8s/04-backend.yaml
#
# Para eliminar el Job después de que complete:
#   kubectl delete -f k8s/03-migrations-job.yaml
#
# Nota: actualiza `image` con el mismo tag que usas en el backend Deployment.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: batch/v1
kind: Job
metadata:
  name: scrumforge-migrations
  namespace: scrumforge
  labels:
    app: scrumforge-backend
    component: migrations
spec:
  # El Job no se reintenta si falla — forzamos revisión manual ante un error
  backoffLimit: 0
  # Limpiar el Job automáticamente 10 minutos después de que complete
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: scrumforge-backend
        component: migrations
    spec:
      restartPolicy: Never
      containers:
        - name: migrations
          # Usar la misma imagen y tag que el backend Deployment
          image: your-registry/scrumforge-backend:latest
          command:
            - npx
            - prisma
            - migrate
            - deploy
            - --schema=src/config/db/schema.prisma
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
