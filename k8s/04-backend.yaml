# ── Backend (Apollo Server + Express + Prisma) ─────────────────────────────────
# Actualiza `image` con la imagen publicada en tu registro de contenedores.
#
# Variables sensibles → backend-secret (nunca en el ConfigMap)
# Variables no sensibles → backend-config
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: scrumforge
  labels:
    app: scrumforge-backend
data:
  NODE_ENV: "production"
  PORT: "4000"
  LOG_LEVEL: "info"
  # Ajusta con tu dominio real
  BACKEND_URL: "https://api.tudominio.com"
  FRONTEND_URL: "https://tudominio.com"
  JWT_EXPIRES_IN: "7d"
  JWT_REFRESH_EXPIRES_IN: "30d"
  # proxy: el ingress nginx termina TLS y reenvía con X-Forwarded-Proto: https
  HTTPS_MODE: "proxy"
  # Extensiones a cargar — lista solo las que hayas instalado en la imagen
  ENABLED_EXTENSIONS: ""

---

# IMPORTANTE: Reemplaza todos los valores antes de aplicar en producción.
# Para generarlo desde la línea de comandos (más seguro):
#
#   kubectl create secret generic backend-secret \
#     --namespace=scrumforge \
#     --from-literal=DATABASE_URL='postgresql://scrumforge:PASSWORD@postgres:5432/scrumforge' \
#     --from-literal=JWT_SECRET='$(openssl rand -base64 48)' \
#     --from-literal=REDIS_URL='redis://redis:6379'
#
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: scrumforge
  labels:
    app: scrumforge-backend
type: Opaque
stringData:
  DATABASE_URL: "postgresql://scrumforge:CAMBIAR_CONTRASEÑA@postgres:5432/scrumforge"
  JWT_SECRET: "CAMBIAR_POR_CADENA_ALEATORIA_DE_AL_MENOS_32_CARACTERES"
  REDIS_URL: "redis://redis:6379"
  # Servicios opcionales — dejar vacío si no se usan
  ANTHROPIC_API_KEY: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  STRIPE_PRICE_PRO: ""
  STRIPE_PRICE_BUSINESS: ""
  GITHUB_TOKEN: ""
  SLACK_WEBHOOK_URL: ""
  RESEND_API_KEY: ""
  ADMIN_EMAIL: ""

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrumforge-backend
  namespace: scrumforge
  labels:
    app: scrumforge-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scrumforge-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # zero-downtime: siempre hay al menos 2 pods activos
      maxSurge: 1
  template:
    metadata:
      labels:
        app: scrumforge-backend
    spec:
      # Esperar a que Kubernetes enrute tráfico solo cuando el pod está listo
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: your-registry/scrumforge-backend:latest
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          # Liveness: reinicia el pod si el servidor deja de responder
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          # Readiness: solo enruta tráfico cuando la DB responde
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # Startup: tiempo extra para el primer arranque (migraciones pendientes, cold start)
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            failureThreshold: 12   # 12 × 5s = 60s máximo para arrancar
            periodSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: scrumforge-backend
  namespace: scrumforge
  labels:
    app: scrumforge-backend
spec:
  selector:
    app: scrumforge-backend
  ports:
    - port: 4000
      targetPort: 4000
      name: http
  type: ClusterIP

---

# HPA: escala automáticamente entre 2 y 10 réplicas según CPU
# Requiere metrics-server instalado en el clúster:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scrumforge-backend
  namespace: scrumforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scrumforge-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
