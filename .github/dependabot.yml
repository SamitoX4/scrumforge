version: 2
updates:
  # ── Backend ────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Lima"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    # Agrupar actualizaciones de paquetes relacionados en un solo PR
    groups:
      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"
      apollo:
        patterns:
          - "@apollo/*"
          - "graphql*"
      stripe:
        patterns:
          - "stripe"

  # ── Frontend ───────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Lima"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      react:
        patterns:
          - "react"
          - "react-*"
          - "@types/react*"
      apollo-client:
        patterns:
          - "@apollo/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
