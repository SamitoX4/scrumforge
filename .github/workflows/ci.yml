name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, Type-check & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scrumforge_test
          POSTGRES_USER: scrumforge
          POSTGRES_PASSWORD: scrumforge123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://scrumforge:scrumforge123@localhost:5432/scrumforge_test
      JWT_SECRET: ci-test-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-characters
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx jest --passWithNoTests --forceExit

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Type-check, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          VITE_GRAPHQL_URL: http://localhost:4000/graphql
          VITE_WS_URL: ws://localhost:4000/graphql
          VITE_BACKEND_URL: http://localhost:4000
